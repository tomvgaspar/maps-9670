function calcStats(T,A,P,AS){
  const now=Date.now(),act=AS.filter(a=>!a.returnedAt),done=AS.filter(a=>a.returnedAt);

  const uw=T.filter(t=>!eTids.has(t.id));
  return{total:T.length,withPub:aTids.size,notAssigned:T.length-aTids.size,totalAddresses:A.length,doneLast3:d3.length,doneLast6:d6.length,doneLast12:d12.length,completedPct:T.length?Math.round(d12.length/T.length*100):0,inProgress:act.length,inProg3:act.filter(a=>a.assignedAt<(now-weeksMs(13))).length,inProg6:act.filter(a=>a.assignedAt<(now-weeksMs(26))).length,unworked:uw.length,unw6:uw.filter(t=>t.createdAt<(now-weeksMs(26))).length,unw12:uw.filter(t=>t.createdAt<(now-52*7*24*3600000)).length,unw24:uw.filter(t=>t.createdAt<(now-104*7*24*3600000)).length,avgWeeks:avg,coveragePct:T.length?Math.round(d12.length/T.length*100):0,participationPct:P.length?Math.round(pA.size/P.length*100):0,alerts:act.filter(a=>a.assignedAt<(now-weeksMs(26)))};

function App({user}){
  const [T,setT]=useState([]),[A,setA]=useState([]),[AL,setAL]=useState([]),[P,setP]=useState([]),[AS,setAS]=useState([]);

function ReportsView({T,A,P,AS,cfg}){
  const now=Date.now();
  const firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  const toStr=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;};
  const [dateFrom,setDateFrom]=useState(toStr(firstDay));
  const [dateTo,setDateTo]=useState(todayStr());
  const [selCats,setSelCats]=useState([]);
  const [selTags,setSelTags]=useState([]);
  const [selGroups,setSelGroups]=useState([]);
  const [showUnworked,setShowUnworked]=useState(true);
  const [showWorked,setShowWorked]=useState(true);
  const [showAssigned,setShowAssigned]=useState(true);
  const [showLate,setShowLate]=useState(true);

  const allGroups=useMemo(()=>[...new Set(P.map(p=>p.serviceGroup||'').concat(AS.map(a=>a.serviceGroup||'')).filter(Boolean))].sort(),[P,AS]);
  const allTags=useMemo(()=>[...new Set(AS.flatMap(a=>a.tags||[]))].sort(),[AS]);

  const toggleArr=(arr,setArr,v)=>setArr(a=>a.includes(v)?a.filter(x=>x!==v):[...a,v]);

  const fromMs=new Date(dateFrom+'T00:00:00').getTime();
  const toMs=new Date(dateTo+'T23:59:59').getTime();

  const results=useMemo(()=>{
    const rows=[];
    T.forEach(t=>{
      if(selCats.length>0&&!selCats.includes(t.category))return;
      const tAS=AS.filter(a=>a.territoryId===t.id);
      const activeA=tAS.find(a=>!a.returnedAt);
      const doneInRange=tAS.filter(a=>a.returnedAt&&a.returnedAt>=fromMs&&a.returnedAt<=toMs);
      const assignedInRange=tAS.filter(a=>a.assignedAt>=fromMs&&a.assignedAt<=toMs);
      const isWorked=doneInRange.length>0;
      const isAssigned=!!activeA;
      const isUnworked=tAS.length===0||(!activeA&&doneInRange.length===0);
      const isLate=activeA&&activeA.assignedAt<(now-26*7*24*3600000);

      if(selTags.length>0){
        const tTagged=tAS.some(a=>(a.tags||[]).some(tg=>selTags.includes(tg)));
        if(!tTagged)return;
      }
      if(selGroups.length>0){
        const tGrouped=tAS.some(a=>{
          if(a.publisherId){const p=P.find(x=>x.id===a.publisherId);return p&&selGroups.includes(p.serviceGroup||'');}
          return a.serviceGroup&&selGroups.includes(a.serviceGroup);
        });
        if(!tGrouped)return;
      }

      const show=(showWorked&&isWorked)||(showAssigned&&isAssigned&&!isWorked)||(showUnworked&&isUnworked)||(showLate&&isLate);
      if(!show)return;

      const lastA=tAS.filter(a=>a.returnedAt).sort((a,b)=>b.returnedAt-a.returnedAt)[0];
      const pub=activeA?.publisherId?P.find(x=>x.id===activeA.publisherId):null;

      rows.push({t,isWorked,isAssigned,isUnworked,isLate,activeA,lastA,pub,doneInRange,assignedInRange});
    });
    return rows.sort((a,b)=>((a.t.num||'')+a.t.name).localeCompare((b.t.num||'')+b.t.name));
  },[T,AS,P,fromMs,toMs,selCats,selTags,selGroups,showWorked,showAssigned,showUnworked,showLate]);

  const summary={total:results.length,worked:results.filter(r=>r.isWorked).length,assigned:results.filter(r=>r.isAssigned&&!r.isWorked).length,unworked:results.filter(r=>r.isUnworked).length,late:results.filter(r=>r.isLate).length};

  const ChipGroup=({label,items,sel,onToggle,color})=>items.length===0?null:e('div',{style:{marginBottom:10}},
    e('div',{className:'lbl'},label),
    e('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
      items.map(v=>e('span',{key:v,className:'chip'+(sel.includes(v)?' sel':''),style:sel.includes(v)&&color?{background:color,borderColor:color,color:'#fff'}:{},onClick:()=>onToggle(v)},v))
    )
  );

  const Toggle=({label,val,onToggle,color})=>e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer'},onClick:onToggle},
    e('div',{style:{width:36,height:20,borderRadius:10,background:val?color||'var(--acc)':'var(--bg3)',border:'.5px solid var(--bd2)',transition:'background .2s',position:'relative'}},
      e('div',{style:{width:16,height:16,borderRadius:8,background:'#fff',position:'absolute',top:2,left:val?18:2,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}})
    ),
    e('span',{style:{fontSize:14,color:val?'var(--text)':'var(--text2)'}},label)
  );

  return e('div',null,
    e('div',{style:{fontWeight:700,fontSize:17,marginBottom:14}},'Relatórios'),

    e('div',{className:'card',style:{marginBottom:10}},
      e('div',{style:{fontWeight:600,fontSize:14,marginBottom:10}},'Período'),
      e('div',{className:'g2'},
        e('div',{className:'fg',style:{marginBottom:0}},e('label',{className:'lbl'},'De'),e('input',{type:'date',value:dateFrom,onChange:ev=>setDateFrom(ev.target.value)})),
        e('div',{className:'fg',style:{marginBottom:0}},e('label',{className:'lbl'},'Até'),e('input',{type:'date',value:dateTo,onChange:ev=>setDateTo(ev.target.value)}))
      )
    ),

    e('div',{className:'card',style:{marginBottom:10}},
      e('div',{style:{fontWeight:600,fontSize:14,marginBottom:10}},'Filtros'),
      e(ChipGroup,{label:'Categorias (todas se vazio)',items:cfg.categories,sel:selCats,onToggle:v=>toggleArr(selCats,setSelCats,v)}),
      e(ChipGroup,{label:'Tags / Campanhas (todas se vazio)',items:allTags,sel:selTags,onToggle:v=>toggleArr(selTags,setSelTags,v),color:'#d97706'}),
      e(ChipGroup,{label:'Grupos de serviço (todos se vazio)',items:allGroups,sel:selGroups,onToggle:v=>toggleArr(selGroups,setSelGroups,v),color:'#2563eb'}),
      e('div',{className:'sep'}),
      e('div',{style:{fontWeight:600,fontSize:13,marginBottom:8,color:'var(--text2)'}},'Mostrar'),
      e(Toggle,{label:'Trabalhados no período',val:showWorked,onToggle:()=>setShowWorked(v=>!v),color:'var(--green)'}),
      e(Toggle,{label:'Atribuídos (em mãos)',val:showAssigned,onToggle:()=>setShowAssigned(v=>!v),color:'#2563eb'}),
      e(Toggle,{label:'Não trabalhados',val:showUnworked,onToggle:()=>setShowUnworked(v=>!v),color:'var(--text2)'}),
      e(Toggle,{label:'Em atraso (>6 meses)',val:showLate,onToggle:()=>setShowLate(v=>!v),color:'var(--red)'})
    ),

    e('div',{className:'kpi-grid',style:{marginBottom:12}},
      [['Total',summary.total,''],['Trabalhados',summary.worked,'kv-g'],['Em mãos',summary.assigned,'kv-b'],['Não trab.',summary.unworked,''],['Em atraso',summary.late,'kv-r']].map(([l,v,c],i)=>
        e('div',{key:i,className:'kpi-cell'},e('div',{className:'kpi-lbl'},l),e('div',{className:'kpi-val '+(c||'')},v))
      )
    ),

    results.length===0?e('div',{className:'empty'},'Nenhum território para os filtros selecionados.'):
    e('div',null,
      results.map(({t,isWorked,isAssigned,isUnworked,isLate,activeA,lastA,pub,doneInRange})=>
        e('div',{key:t.id,className:'card',style:{marginBottom:8}},
          e('div',{className:'rb'},
            e('div',{style:{flex:1}},
              e('div',{style:{fontWeight:600,fontSize:14}},t.num?e('span',{style:{color:'var(--text2)',fontWeight:400,fontSize:12,marginRight:4}},t.num):null,t.name),
              e('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}},t.category)
            ),
            e('div',{style:{display:'flex',flexWrap:'wrap',gap:4,justifyContent:'flex-end'}},
              isLate&&e('span',{className:'badge balert'},'⚠ Atraso'),
              isWorked&&e('span',{className:'badge bC'},'✓ Trabalhado'),
              isAssigned&&!isWorked&&e('span',{className:'badge bH'},'Em mãos'),
              isUnworked&&e('span',{style:{fontSize:12,color:'var(--text2)'}},'Não trabalhado')
            )
          ),
          (isAssigned||isWorked)&&e('div',{style:{marginTop:6,fontSize:12,color:'var(--text2)'}},
            activeA&&e('div',null,'Atribuído a: ',e('strong',null,pub?.name||activeA.serviceGroup||'Grupo'),' desde ',fmt(activeA.assignedAt)),
            doneInRange.length>0&&e('div',null,'Concluído(s) no período: ',e('strong',null,doneInRange.length)),
            lastA&&!activeA&&e('div',null,'Último: ',fmt(lastA.returnedAt))

          activeA&&(activeA.tags||[]).length>0&&e('div',{className:'pill-row'},
            (activeA.tags||[]).map(tg=>e('span',{key:tg,className:'btag badge'},tg))
          )
        )
      )
    )
  );
}
